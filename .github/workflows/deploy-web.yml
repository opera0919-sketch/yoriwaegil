name: Deploy RecipeBox to GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - "web/**"
      - "recipe-box.jsx"
      - ".github/workflows/deploy-web.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Sync recipe-box.jsx into web/src
        run: |
          cp recipe-box.jsx web/src/recipe-box.jsx
          sed -i 's|from "https://esm.sh/@supabase/supabase-js@2"|from "@supabase/supabase-js"|g' web/src/recipe-box.jsx

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Build
        working-directory: web
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
